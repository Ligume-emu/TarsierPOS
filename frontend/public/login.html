<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/tarsier-icon.svg">
    <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
    <title>TarsierPOS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #FF6B00 0%, #FF8C00 50%, #FFa500 100%);
            min-height: 100vh;
        }
        #loginBtn {
            background: linear-gradient(135deg, #FF6B00, #FF8C00);
        }
        #loginBtn:hover:not(:disabled) {
            background: linear-gradient(135deg, #e55f00, #e07800);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- Logo/Title -->
        <div class="text-center mb-8">
            <img src="icons/tarsier-logo.png" alt="TarsierPOS" style="width:64px;height:64px;border-radius:16px;object-fit:contain;" class="mx-auto mb-4">
            <h1 class="text-3xl font-bold text-gray-800">TarsierPOS</h1>
            <p class="text-gray-500 mt-2">Sign in to continue</p>
        </div>

        <!-- Quick Login -->
        <div id="quick-login-section" class="hidden mb-4">
            <p class="text-xs text-gray-400 mb-2 text-center">Quick Login</p>
            <div id="quick-login-buttons" class="flex gap-2 flex-wrap"></div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>
                <input 
                    type="text" 
                    id="username" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#FF6B00] focus:border-transparent outline-none transition"
                    placeholder="Enter your username"
                >
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#FF6B00] focus:border-transparent outline-none transition"
                    placeholder="Enter your password"
                >
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <span id="errorText">Invalid credentials</span>
                </div>
            </div>

            <!-- Login Button -->
            <button 
                type="submit" 
                id="loginBtn"
                class="w-full text-white py-3 rounded-lg font-semibold transition duration-200 shadow-lg hover:shadow-xl"
            >
                Sign In
            </button>
        </form>

        <!-- Add Account -->
        <div class="mt-6 pt-6 border-t border-gray-200">
            <button onclick="toggleCreateAccount()"
                    class="w-full text-sm text-gray-500 hover:text-gray-700 transition">
                + Add Account
            </button>
            <div id="create-account-panel" class="hidden mt-4 space-y-3">
                <h3 class="text-sm font-semibold text-gray-700">Create New Account</h3>
                <input type="text" id="new-username" placeholder="Username"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                <input type="password" id="new-password" placeholder="Password"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                <select id="new-role" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="cashier">Cashier</option>
                    <option value="manager">Manager</option>
                </select>
                <p class="text-xs text-gray-400">You must be logged in as admin or manager to create accounts.</p>
                <button onclick="createAccount()"
                        class="w-full py-2 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-700">
                    Create Account
                </button>
                <div id="create-account-msg" class="hidden text-sm text-center"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // API_BASE is defined in config.js (loaded before this script)
        
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');

        // Get CSRF token from cookie
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // JWT auth does not require CSRF initialization for the token endpoint
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Hide error
            errorMessage.classList.add('hidden');
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                // Pointing to the new SimpleJWT endpoint
                const response = await fetch(`${AUTH_API}/token/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                console.log('Login response:', response.status);

                if (response.ok) {
                    // Store JWT tokens in localStorage
                    setToken(data.access, data.refresh);
                    console.log('Token stored:', localStorage.getItem('access_token'));
                    
                    // Redirect to POS
                    console.log('Redirecting to POS...');
                    window.location.href = 'index.html';
                } else {
                    // Show error
                    errorText.textContent = data.detail || 'Invalid username or password';
                    errorMessage.classList.remove('hidden');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorText.textContent = 'Connection error. Please try again.';
                errorMessage.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        // ── Quick Login ──────────────────────────────────────────────────────
        async function loadQuickLoginButtons() {
            try {
                const response = await fetch(`${API_BASE}/users/quick-login/`);
                if (!response.ok) return;
                const users = await response.json();
                const container = document.getElementById('quick-login-buttons');
                if (!container) return;
                const managers = users.filter(u => u.role === 'manager' || u.role === 'admin').slice(0, 1);
                const cashiers = users.filter(u => u.role === 'cashier').slice(0, 2);
                const shown = [...managers, ...cashiers];
                shown.forEach(user => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'flex-1 py-2 px-3 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition truncate';
                    btn.textContent = user.username;
                    btn.onclick = () => {
                        document.getElementById('username').value = user.username;
                        document.getElementById('password').focus();
                    };
                    container.appendChild(btn);
                });
                if (shown.length > 0) {
                    document.getElementById('quick-login-section').classList.remove('hidden');
                }
            } catch (e) { /* silently fail — quick login is optional */ }
        }

        // ── Add Account ──────────────────────────────────────────────────────
        function toggleCreateAccount() {
            document.getElementById('create-account-panel').classList.toggle('hidden');
        }

        async function createAccount() {
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;
            const msg = document.getElementById('create-account-msg');

            if (!username || !password) {
                msg.textContent = 'Username and password are required.';
                msg.className = 'text-sm text-center text-red-600';
                msg.classList.remove('hidden');
                return;
            }
            try {
                const response = await authenticatedFetch(`${API_BASE}/users/`, {
                    method: 'POST',
                    body: JSON.stringify({ username, password, role })
                });
                if (response.ok) {
                    msg.textContent = `Account "${username}" created successfully.`;
                    msg.className = 'text-sm text-center text-green-600';
                    msg.classList.remove('hidden');
                    document.getElementById('new-username').value = '';
                    document.getElementById('new-password').value = '';
                } else {
                    const err = await response.json().catch(() => ({}));
                    msg.textContent = err.detail || err.username?.[0] || err.error || 'Failed to create account.';
                    msg.className = 'text-sm text-center text-red-600';
                    msg.classList.remove('hidden');
                }
            } catch (e) {
                msg.textContent = 'Network error. Are you logged in?';
                msg.className = 'text-sm text-center text-red-600';
                msg.classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', loadQuickLoginButtons);
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .catch(err => console.log('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
