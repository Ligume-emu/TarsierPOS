<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Report - TarsierPOS</title>
    <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/tarsier-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shared-styles.css">
    <script src="config.js"></script>
    <script src="components/nav.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            nav { display: none !important; }
            body { background: white; }
        }
    </style>
</head>
<body class="bg-gray-50" data-page="xreport">
    <script>if (!localStorage.getItem('access_token')) { window.location.replace('login.html'); }</script>

    <!-- NAVIGATION (FEATURE-029: canonical shared nav) -->
    <div id="nav-mount"></div>
    <script>renderNav({ activePage: 'xreport', printSafe: true });</script>

    <!-- MAIN CONTENT -->
    <div class="container mx-auto px-4 py-6 max-w-3xl">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6 no-print">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">📊 X-Report</h2>
                <p class="text-gray-500 text-sm mt-1">Current shift sales summary</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="fetchReport()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">
                    ↻ Refresh
                </button>
                <button onclick="thermalPrintXReport()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition">
                    🖨️ Thermal Print
                </button>
            </div>
        </div>

        <!-- Status area -->
        <div id="status-area"></div>

        <!-- Report content (hidden until loaded) -->
        <div id="report-content" class="hidden">

            <!-- Shift info -->
            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <div class="flex justify-between text-sm text-gray-600">
                    <div><span class="font-semibold">Cashier:</span> <span id="rpt-cashier"></span></div>
                    <div><span class="font-semibold">Shift opened:</span> <span id="rpt-opened"></span></div>
                </div>
                <div class="text-xs text-gray-400 mt-1 text-right">Generated: <span id="rpt-generated"></span></div>
            </div>

            <!-- Summary cards -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-white rounded-xl shadow p-4 text-center">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Gross Sales</div>
                    <div class="text-2xl font-bold text-green-600" id="rpt-gross"></div>
                </div>
                <div class="bg-white rounded-xl shadow p-4 text-center">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Net Sales</div>
                    <div class="text-2xl font-bold text-blue-600" id="rpt-net"></div>
                </div>
                <div class="bg-white rounded-xl shadow p-4 text-center">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Transactions</div>
                    <div class="text-2xl font-bold text-gray-800" id="rpt-txn-count"></div>
                </div>
                <div class="bg-white rounded-xl shadow p-4 text-center">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Voids</div>
                    <div class="text-2xl font-bold text-red-500" id="rpt-void-count"></div>
                </div>
            </div>

            <!-- Payment method breakdown -->
            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <h3 class="font-bold text-gray-700 mb-3 text-sm uppercase tracking-wide">Payment Breakdown</h3>
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-gray-500 border-b">
                            <th class="text-left pb-2">Method</th>
                            <th class="text-right pb-2">Count</th>
                            <th class="text-right pb-2">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="rpt-by-method"></tbody>
                </table>
            </div>

            <!-- Void detail -->
            <div class="bg-white rounded-xl shadow p-4 text-sm text-gray-600">
                <div class="flex justify-between">
                    <span>Void Total</span>
                    <span class="font-semibold text-red-500" id="rpt-void-total"></span>
                </div>
                <div class="flex justify-between mt-1">
                    <span>Average Transaction</span>
                    <span class="font-semibold" id="rpt-avg"></span>
                </div>
            </div>

        </div><!-- end #report-content -->
    </div>

    <script src="dialogs.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Role gate: allow cashier AND manager/admin (xreport is cashier-accessible)
            const role = getUserRole();
            if (!role) {
                window.location.replace('login.html');
                return;
            }

            loadSiteName();
            loadColorScheme();
            // Menu toggle handled by components/nav.js
            fetchReport();
        });

        let currentXReportData = null;

        async function thermalPrintXReport() {
            if (!currentXReportData) return;
            try {
                authenticatedFetch(`${API_BASE}/transactions/print_xreport/`, {
                    method: 'POST',
                    body: JSON.stringify(currentXReportData)
                });
            } catch(e) { /* non-fatal */ }
        }

        function fmt(n) {
            if (n === null || n === undefined || isNaN(parseFloat(n))) return '₱0.00';
            return '₱' + parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function fmtDatetime(iso) {
            if (!iso) return '-';
            return formatDT(iso);
        }

        async function fetchReport() {
            const statusArea = document.getElementById('status-area');
            const content = document.getElementById('report-content');
            statusArea.innerHTML = `
                <div class="bg-blue-50 border border-blue-200 rounded-xl p-6 text-center text-blue-600 mb-4">
                    Loading shift report...
                </div>`;
            content.classList.add('hidden');

            try {
                const res = await authenticatedFetch(`${API_BASE}/transactions/xreport/`);
                const data = await res.json();

                if (res.status === 404 || data.error) {
                    statusArea.innerHTML = `
                        <div class="bg-yellow-50 border border-yellow-300 rounded-xl p-6 text-center mb-4">
                            <div class="text-4xl mb-3">⏸️</div>
                            <div class="text-lg font-bold text-yellow-700 mb-1">No Open Shift</div>
                            <div class="text-yellow-600 text-sm">${data.error || 'Start a shift first to generate an X-Report.'}</div>
                        </div>`;
                    return;
                }

                if (!res.ok) {
                    throw new Error(`Server error: ${res.status}`);
                }

                statusArea.innerHTML = '';
                content.classList.remove('hidden');
                currentXReportData = data;

                document.getElementById('rpt-cashier').textContent = data.cashier;
                document.getElementById('rpt-opened').textContent = fmtDatetime(data.opened_at);
                document.getElementById('rpt-generated').textContent = fmtDatetime(data.generated_at);
                document.getElementById('rpt-gross').textContent = fmt(data.gross_sales);
                document.getElementById('rpt-net').textContent = fmt(data.net_sales);
                document.getElementById('rpt-txn-count').textContent = data.transaction_count;
                document.getElementById('rpt-void-count').textContent = data.void_count;
                document.getElementById('rpt-void-total').textContent = fmt(data.void_total);
                document.getElementById('rpt-avg').textContent = fmt(data.average_transaction);

                const methodLabels = { cash: '💵 Cash', gcash: '💙 GCash', maya: '💚 Maya' };
                const tbody = document.getElementById('rpt-by-method');
                tbody.innerHTML = '';
                data.by_payment_method.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b last:border-0';
                    tr.innerHTML = `
                        <td class="py-2">${methodLabels[row.payment_method] || row.payment_method}</td>
                        <td class="py-2 text-right text-gray-500">${row.count}</td>
                        <td class="py-2 text-right font-semibold">${fmt(row.subtotal)}</td>`;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                statusArea.innerHTML = `
                    <div class="bg-red-50 border border-red-300 rounded-xl p-6 text-center mb-4">
                        <div class="text-4xl mb-3">⚠️</div>
                        <div class="text-lg font-bold text-red-700 mb-1">Error Loading Report</div>
                        <div class="text-red-600 text-sm">${err.message}</div>
                    </div>`;
            }
        }

        // logout() is provided by config.js (awaits token blacklist, then location.replace)
    </script>
<script>
// User info + live clock handled by components/nav.js (FEATURE-029)
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  }
</script>
</body>
</html>
