<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted — TarsierPOS</title>
    <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/tarsier-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shared-styles.css">
    <script src="config.js"></script>
    <script src="components/format.js"></script>
    <script src="components/nav.js"></script>
    <style>
        /* Denied page — token-only styling (ISSUE-087 Part B) */
        .denied-shell {
            max-width: 560px;
            margin: 0 auto;
            padding: var(--space-6) var(--space-4);
        }
        .denied-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-raised);
            padding: var(--space-6);
            text-align: center;
        }
        .denied-icon {
            font-size: 3rem;
            line-height: 1;
            margin-bottom: var(--space-3);
        }
        .denied-title {
            font-size: var(--text-2xl);
            color: var(--color-ink);
            font-weight: 700;
            margin: 0 0 var(--space-3) 0;
        }
        .denied-body {
            color: var(--color-ink-muted);
            font-size: var(--text-base);
            line-height: 1.5;
            margin: 0 0 var(--space-4) 0;
        }
        .denied-from {
            background: var(--color-surface-alt);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            color: var(--color-ink-muted);
            font-size: var(--text-sm);
            margin-bottom: var(--space-5);
            word-break: break-all;
        }
        .denied-from-label {
            color: var(--color-ink-muted);
            font-weight: 600;
        }
        .denied-from-path {
            color: var(--color-ink);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
        }
        .denied-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }
        .denied-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: var(--touch-min);
            padding: 0 var(--space-5);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: var(--text-base);
            cursor: pointer;
            border: 1px solid transparent;
            transition: background-color 0.15s, border-color 0.15s;
        }
        .denied-btn:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }
        .denied-btn-primary {
            background: var(--color-primary);
            color: #ffffff;
        }
        .denied-btn-primary:hover { background: var(--color-primary-hover); }
        .denied-btn-secondary {
            background: var(--color-surface);
            color: var(--color-ink);
            border-color: var(--color-border);
        }
        .denied-btn-secondary:hover { background: var(--color-surface-alt); }
    </style>
</head>
<body class="bg-gray-50" data-page="denied" style="visibility:hidden">
    <script>
        // Require auth — anyone hitting denied.html without a token belongs at login.
        (function () {
            if (!localStorage.getItem('access_token')) {
                window.location.replace('login.html');
                return;
            }
            document.body.style.visibility = '';
        })();
    </script>

    <!-- NAVIGATION (FEATURE-029: canonical shared nav) -->
    <div id="nav-mount"></div>
    <script>renderNav({ activePage: 'denied' });</script>

    <main class="denied-shell">
        <div class="denied-card">
            <div class="denied-icon" aria-hidden="true">🔒</div>
            <h1 class="denied-title">Access restricted</h1>
            <p class="denied-body">
                This page is for managers and admins. Ask your manager
                if you think this is a mistake.
            </p>
            <div id="denied-from" class="denied-from" hidden>
                <span class="denied-from-label">You tried to access:</span>
                <span id="denied-from-path" class="denied-from-path"></span>
            </div>
            <div class="denied-actions">
                <a href="index.html" class="denied-btn denied-btn-primary">Back to POS</a>
                <button id="denied-signout" type="button" class="denied-btn denied-btn-secondary">Sign out</button>
            </div>
        </div>
    </main>

    <script>
        (function () {
            // Surface the page they tried to access, if provided.
            try {
                const params = new URLSearchParams(window.location.search);
                const from = params.get('from');
                if (from) {
                    const box = document.getElementById('denied-from');
                    const path = document.getElementById('denied-from-path');
                    // Only render if it looks like a same-origin path (defense vs reflected XSS via querystring).
                    if (path && box && /^\/[A-Za-z0-9._\-\/?=&%]*$/.test(from)) {
                        path.textContent = from;
                        box.hidden = false;
                    }
                }
            } catch (e) { /* ignore */ }

            // Sign out — reuse canonical logout() from config.js.
            document.getElementById('denied-signout').addEventListener('click', function () {
                if (typeof logout === 'function') {
                    logout();
                } else {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    window.location.replace('login.html');
                }
            });
        })();
    </script>
</body>
</html>
